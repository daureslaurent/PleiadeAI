server {
  listen 3000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Don't emit the nginx version in the Server header (defense in depth — Caddy also strips it at the
  # edge). Reduces the version-disclosure fingerprint if this port is ever reached directly.
  server_tokens off;

  # SPA fallback: client-side routes (BrowserRouter) resolve to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
