<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Tile background: deep space, slightly lit toward the cluster -->
    <radialGradient id="bg" cx="42%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1b2536"/>
      <stop offset="55%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </radialGradient>
    <!-- Faint nebulosity the Pleiades are famous for -->
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#6366f1" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </radialGradient>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <ellipse cx="31" cy="33" rx="24" ry="21" fill="url(#nebula)"/>

  <!-- The cluster: Seven Sisters + a couple of dimmer companions -->
  <g fill="url(#star)" filter="url(#glow)">
    <circle cx="24" cy="20" r="1.4" opacity="0.85"/>
    <circle cx="30" cy="16" r="1.1" opacity="0.7"/>
    <circle cx="19" cy="26" r="1.2" opacity="0.75"/>
    <circle cx="28" cy="26" r="2.1"/>
    <circle cx="22" cy="34" r="2.4"/>
    <circle cx="31" cy="44" r="1.9"/>
    <circle cx="44" cy="46" r="2.2"/>
    <circle cx="49" cy="41" r="1.5" opacity="0.85"/>
  </g>

  <!-- Alcyone, the brightest sister, with a sparkle -->
  <g filter="url(#glow)">
    <circle cx="35" cy="35" r="3.4" fill="url(#star)"/>
    <path d="M35 27.5 L36.1 33.9 L42.5 35 L36.1 36.1 L35 42.5 L33.9 36.1 L27.5 35 L33.9 33.9 Z"
          fill="#ffffff" opacity="0.95"/>
  </g>
</svg>
