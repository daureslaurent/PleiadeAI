<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- The Pleiades (M45): the nine brightest members at their true relative sky positions, sized by
       true magnitude, tilted 20°. Same geometry as the in-app mark (src/components/PleiadesMark.tsx)
       — keep the two in step if either changes. -->
  <defs>
    <!-- Tile background: deep space, slightly lit toward the cluster -->
    <radialGradient id="bg" cx="42%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1b2536"/>
      <stop offset="55%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </radialGradient>
    <!-- Faint nebulosity the Pleiades are famous for -->
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.9"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <ellipse cx="32" cy="32" rx="27" ry="23" fill="url(#nebula)" transform="rotate(-20 32 32)"/>

  <!-- Halo pass -->
  <g fill="#93c5fd" opacity="0.75" filter="url(#bloom)">
    <circle cx="27.41" cy="41.20" r="3.84"/>
    <circle cx="10.16" cy="50.24" r="3.00"/>
    <circle cx="55.47" cy="30.53" r="2.88"/>
    <circle cx="40.85" cy="22.24" r="2.76"/>
    <circle cx="42.51" cy="44.11" r="2.52"/>
    <circle cx="45.79" cy="15.12" r="2.40"/>
    <circle cx="8.53" cy="46.37" r="1.87"/>
    <circle cx="53.15" cy="21.95" r="1.58"/>
    <circle cx="36.75" cy="13.76" r="1.39"/>
  </g>

  <!-- Alcyone's diffraction spikes -->
  <g stroke="#bfdbfe" stroke-opacity="0.5" stroke-width="0.8" stroke-linecap="round">
    <line x1="17.81" y1="41.20" x2="37.01" y2="41.20"/>
    <line x1="27.41" y1="31.60" x2="27.41" y2="50.80"/>
  </g>

  <!-- Cores: Alcyone, Atlas, Electra, Maia, Merope, Taygeta, Pleione, Celaeno, Sterope -->
  <g fill="#ffffff">
    <circle cx="27.41" cy="41.20" r="2.13"/>
    <circle cx="10.16" cy="50.24" r="1.67"/>
    <circle cx="55.47" cy="30.53" r="1.60"/>
    <circle cx="40.85" cy="22.24" r="1.53"/>
    <circle cx="42.51" cy="44.11" r="1.40"/>
    <circle cx="45.79" cy="15.12" r="1.33"/>
    <circle cx="8.53" cy="46.37" r="1.04"/>
    <circle cx="53.15" cy="21.95" r="0.88"/>
    <circle cx="36.75" cy="13.76" r="0.77"/>
  </g>
</svg>
