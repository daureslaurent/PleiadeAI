# Standalone compose for the fine-tune box (dual NVIDIA GPUs, 32GB total VRAM).
# Run from the finetune/ directory:  docker compose up --build
services:
  finetune:
    build:
      context: .
      dockerfile: Dockerfile
      # GPU-architecture build profile — set these in .env (see .env.example).
      # Defaults target Ampere/Turing (CUDA 12.1 / torch 2.4.1). Blackwell needs
      # the CUDA 12.8 / torch 2.7.1 / flash-attn 2.8.3 values.
      args:
        CUDA_IMAGE: ${CUDA_IMAGE:-nvidia/cuda:12.1.1-cudnn8-devel-ubuntu22.04}
        TORCH_VERSION: ${TORCH_VERSION:-2.5.1}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu121}
        FLASH_ATTN_VERSION: ${FLASH_ATTN_VERSION:-2.7.4.post1}
        AXOLOTL_REF: ${AXOLOTL_REF:-v0.6.0}
    image: pleiade-finetune
    container_name: pleiade-finetune
    restart: unless-stopped
    env_file: .env
    ports:
      - "${FINETUNE_PORT:-8088}:8088"
    # DeepSpeed / dataloader workers need generous shared memory.
    shm_size: "16gb"
    environment:
      # Make all GPUs visible inside the container.
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    # Legacy runtime hook (Docker with nvidia-container-runtime configured as default or named).
    runtime: nvidia
    # Modern compose GPU reservation (Docker Compose v2 + nvidia toolkit).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      # Uploaded JSONL datasets.
      - ./workspace/data:/workspace/data
      # Produced GGUF artifacts.
      - ./workspace/models:/workspace/models
      # Per-run configs, checkpoints, merged models, logs.
      - ./workspace/runs:/workspace/runs
      # Persist HuggingFace base-model downloads across runs/rebuilds.
      - hf-cache:/root/.cache/huggingface

volumes:
  hf-cache:
