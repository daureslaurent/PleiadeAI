# image-gen — self-hosted GGUF image generation server (stable-diffusion.cpp `sd-server`).
#
# Exposes an OpenAI-compatible endpoint on http://<host>:${SD_PORT:-1234}/v1/images/generations,
# so PleiadesAI (and any OpenAI image client) can generate images the same way it streams chat from
# a remote llama.cpp box. Point a `generate_image` tool / image endpoint at this URL.
#
# Models are NOT baked into the image — they are mounted from ./models (populate it with run.sh).
# Model file names are driven by the .env in this folder (see .env.example); defaults target
# FLUX.2-klein-9B GGUF. This compose is standalone (its own network) and is NOT part of the root
# PleiadesAI stack; run it from this directory with `docker compose up -d`.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  sd-server:
    # leejet publishes only accelerator tags (no plain CPU `master`): master-cuda,
    # master-vulkan, master-sycl, master-musa. Default to CUDA; override via SD_IMAGE.
    image: ${SD_IMAGE:-ghcr.io/leejet/stable-diffusion.cpp:master-cuda}
    container_name: image_gen_sd_server
    restart: unless-stopped
    entrypoint: /sd-server
    # Flags follow upstream's FLUX.2 guide (docs/flux2.md) + examples/server/README.md.
    #
    # FLUX.2 is a different model layout from FLUX.1: the CLIP-L + T5-XXL pair is gone, replaced by a
    # single LLM text encoder (`--llm`; Qwen3 for the klein family, Mistral-Small-3.2 for FLUX.2-dev),
    # and it uses its own VAE. Three files: diffusion model + LLM + VAE.
    # Default is FLUX.2-klein-9B, the largest FLUX.2 that fits this box: FLUX.2-dev needs ~19 GB of
    # weights *plus* a 24B Mistral encoder, which does not fit in 12+8 GB without brutal streaming.
    #
    # Generation defaults (`--cfg-scale`/`--sampling-method`/`--steps`) matter more than they look:
    # sd-server's OpenAI route only reads `prompt`/`n`/`size`/`output_format` from the request body —
    # every other knob comes from these CLI defaults unless the client sends a native
    # `<sd_cpp_extra_args>` block (which the backend's image-generate.ts does). A server left on the
    # stock --cfg-scale 7.0 runs a distilled model at real CFG 7 regardless of what the client asks
    # for, which is what burns/oversaturates the output.
    #   --cfg-scale 1.0     REAL classifier-free guidance, OFF. klein is guidance-*distilled*, so
    #                       flux2.md runs every klein example at 1.0. (klein-*base* is NOT distilled:
    #                       it wants SD_CFG_SCALE=4.0 + SD_STEPS=20, and only then does a negative
    #                       prompt do anything.)
    #   --steps 4           klein is a 4-step distilled model. That is why it is fast despite 9B.
    #   --sampling-method   euler, per flux2.md (the stock default is euler_a, meant for SD-era models).
    # There is no --guidance here: FLUX.2 has no distilled-guidance input (that was a FLUX.1 knob).
    #
    # Placement: the 9B diffusion weights at Q8_0 (~10 GB) sit on cuda0 — the 12 GB 3060; note ggml's
    # cuda0/cuda1 are the REVERSE of nvidia-smi indices on this box. The Qwen3-8B encoder (~5 GB) and
    # the VAE (~0.3 GB) go on cuda1 (the 8 GB 2070), so everything is fully resident and nothing has
    # to stream across PCIe per step. --diffusion-fa (flash attention) keeps the attention buffer small
    # enough for the 3060 to hold weights + compute; --vae-tiling decodes the VAE in tiles.
    #
    # SD_EXTRA_ARGS is the escape hatch for weights that DON'T fit — e.g. a single-GPU box, where the
    # encoder can't have its own card:
    #   SD_EXTRA_ARGS=--offload-to-cpu          (flux2.md's own answer; keeps weights in RAM)
    # (Never add --auto-fit: per its own -h it "Overrides --backend and --params-backend", so it
    # silently discards every placement flag above and OOMs.)
    command: >
      --diffusion-model /models/${SD_DIFFUSION_MODEL:-flux-2-klein-9b-Q8_0.gguf}
      --llm             /models/${SD_LLM:-Qwen3-8B-Q4_K_M.gguf}
      --vae             /models/${SD_VAE:-flux2-vae.safetensors}
      --backend ${SD_BACKEND:-diffusion=cuda0,te=cuda1,vae=cuda1}
      --cfg-scale ${SD_CFG_SCALE:-1.0}
      --sampling-method ${SD_SAMPLING_METHOD:-euler}
      --steps ${SD_STEPS:-4}
      --diffusion-fa
      --vae-tiling
      ${SD_EXTRA_ARGS:-}
      --listen-ip 0.0.0.0
      --listen-port ${SD_PORT:-1234}
      -v
    volumes:
      - ./models:/models
      - ./output:/output
    ports:
      # host_port:container_port. Set SD_HOST_PORT (+ SD_BIND=127.0.0.1) to publish on a private port
      # when fronting with gpu-broker; defaults to SD_PORT so a standalone run is unchanged.
      - "${SD_BIND:-0.0.0.0}:${SD_HOST_PORT:-1234}:${SD_PORT:-1234}"
    logging: *default-logging
    # --- NVIDIA GPU ---------------------------------------------------------
    # The default image (master-cuda) needs the NVIDIA Container Toolkit on the host.
    # For a non-NVIDIA host, set SD_IMAGE to master-vulkan/sycl/musa and delete this block.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
