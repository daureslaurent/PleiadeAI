# image-gen — self-hosted GGUF image generation server (stable-diffusion.cpp `sd-server`).
#
# Exposes an OpenAI-compatible endpoint on http://<host>:${SD_PORT:-1234}/v1/images/generations,
# so PleiadesAI (and any OpenAI image client) can generate images the same way it streams chat from
# a remote llama.cpp box. Point a `generate_image` tool / image endpoint at this URL.
#
# Models are NOT baked into the image — they are mounted from ./models (populate it with run.sh).
# Model file names are driven by the .env in this folder (see .env.example); defaults target
# FLUX.1-dev GGUF. This compose is standalone (its own network) and is NOT part of the root
# PleiadesAI stack; run it from this directory with `docker compose up -d`.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  sd-server:
    # leejet publishes only accelerator tags (no plain CPU `master`): master-cuda,
    # master-vulkan, master-sycl, master-musa. Default to CUDA; override via SD_IMAGE.
    image: ${SD_IMAGE:-ghcr.io/leejet/stable-diffusion.cpp:master-cuda}
    container_name: image_gen_sd_server
    restart: unless-stopped
    entrypoint: /sd-server
    # Flags per `sd-server -h`. FLUX needs four files: diffusion model + two text encoders + VAE.
    # For a single-file model (e.g. SD 1.5 GGUF), replace all four with a single `-m /models/<file>`.
    #
    # Why NOT --auto-fit here: at Q8 the diffusion weights (12.1 GB) + encoders (3.4 GB) + the two
    # per-card compute buffers a layer split allocates (~3.2 GB each) total ~22 GB, but the 8 GB 2070
    # + 12 GB 3060 pair only has ~19.7 GB free. --auto-fit's response is a full-residency layer split
    # that OOMs the 8 GB card ("segment 9 needs 3187 MB, only 2850 available") — AND it "Overrides
    # --backend and --params-backend" (per its -h), so it silently ignores every streaming/placement
    # flag below. That is why identical OOMs recurred no matter what we added. So auto-fit is OFF and
    # we place modules explicitly:
    #   --backend        = where each module COMPUTES. Diffusion on cuda0 (the 12 GB 3060; note ggml's
    #                      cuda0/cuda1 are the REVERSE of nvidia-smi indices on this box — cuda0 is the
    #                      3060, confirmed by cuda0 holding the 9.6 GB slice). Encoders + VAE on cuda1
    #                      (the 8 GB 2070), fully resident (~3.5 GB, fits its ~7.8 GB free).
    #   --params-backend = where each module's WEIGHTS LIVE. diffusion=cpu parks the 12.1 GB in system
    #                      RAM (needs ~13 GB free RAM) instead of VRAM; only the encoders/VAE weights
    #                      sit in VRAM. This is the actual offload lever (--offload-to-cpu is the global
    #                      equivalent but auto-fit ate it; the targeted form survives).
    #   --max-vram cuda0 = the 3060's VRAM residency WINDOW for the streamed diffusion layers (not a
    #                      hard weight cap). With ~3 GB compute buffer, an 11 GiB window keeps ~8 GB of
    #                      layers resident and streams the remaining ~4 GB from RAM per step.
    #   --stream-layers  = residency+prefetch on top of --max-vram (no-op without it); prefetches the
    #                      next layers so the PCIe transfers overlap compute instead of stalling.
    # Trade-off: only ~1/3 of the weights stream, but generation is still slower than fully resident.
    # For a faster, fully-resident run set SD_DIFFUSION_MODEL=flux1-dev-Q5_K_S.gguf (~8.3 GB) — that
    # fits VRAM outright and needs none of the streaming flags.
    #
    # --diffusion-fa runs flash attention in the diffusion model, shrinking the O(seq_len) attention
    # activation buffer (image_seq_len 9216 at 768px) so more of the residency window holds weights.
    # --vae-tiling decodes the VAE in tiles (~1.6 GB buffer -> ~0.4 GB); cheap insurance vs decode OOM.
    command: >
      --diffusion-model /models/${SD_DIFFUSION_MODEL:-flux1-dev-Q8_0.gguf}
      --t5xxl           /models/${SD_T5XXL:-t5-v1_1-xxl-encoder-Q4_K_M.gguf}
      --clip_l          /models/${SD_CLIP_L:-clip_l.safetensors}
      --vae             /models/${SD_VAE:-ae.safetensors}
      --backend ${SD_BACKEND:-diffusion=cuda0,te=cuda1,vae=cuda1}
      --params-backend ${SD_PARAMS_BACKEND:-diffusion=cpu}
      --max-vram ${SD_MAX_VRAM:-cuda0=11}
      --stream-layers
      --diffusion-fa
      --vae-tiling
      --listen-ip 0.0.0.0
      --listen-port ${SD_PORT:-1234}
      -v
    volumes:
      - ./models:/models
      - ./output:/output
    ports:
      # host_port:container_port. Set SD_HOST_PORT (+ SD_BIND=127.0.0.1) to publish on a private port
      # when fronting with gpu-broker; defaults to SD_PORT so a standalone run is unchanged.
      - "${SD_BIND:-0.0.0.0}:${SD_HOST_PORT:-1234}:${SD_PORT:-1234}"
    logging: *default-logging
    # --- NVIDIA GPU ---------------------------------------------------------
    # The default image (master-cuda) needs the NVIDIA Container Toolkit on the host.
    # For a non-NVIDIA host, set SD_IMAGE to master-vulkan/sycl/musa and delete this block.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
