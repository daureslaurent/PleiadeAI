# image-gen — self-hosted GGUF image generation server (stable-diffusion.cpp `sd-server`).
#
# Exposes an OpenAI-compatible endpoint on http://<host>:${SD_PORT:-1234}/v1/images/generations,
# so PleiadesAI (and any OpenAI image client) can generate images the same way it streams chat from
# a remote llama.cpp box. Point a `generate_image` tool / image endpoint at this URL.
#
# Models are NOT baked into the image — they are mounted from ./models (populate it with run.sh).
# Model file names are driven by the .env in this folder (see .env.example); defaults target
# FLUX.1-dev GGUF. This compose is standalone (its own network) and is NOT part of the root
# PleiadesAI stack; run it from this directory with `docker compose up -d`.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  sd-server:
    # leejet publishes only accelerator tags (no plain CPU `master`): master-cuda,
    # master-vulkan, master-sycl, master-musa. Default to CUDA; override via SD_IMAGE.
    image: ${SD_IMAGE:-ghcr.io/leejet/stable-diffusion.cpp:master-cuda}
    container_name: image_gen_sd_server
    restart: unless-stopped
    entrypoint: /sd-server
    # Flags follow upstream's FLUX guide (docs/flux.md) + examples/server/README.md.
    # FLUX needs four files: diffusion model + two text encoders + VAE. For a single-file model
    # (e.g. SD 1.5 GGUF), replace all four with a single `-m /models/<file>`.
    #
    # Generation defaults (the `--cfg-scale`/`--guidance`/`--sampling-method`/`--steps` block) matter
    # more than they look: sd-server's OpenAI route only reads `prompt`/`n`/`size`/`output_format`
    # from the request body — every other knob comes from these CLI defaults unless the client sends
    # a native `<sd_cpp_extra_args>` block (which the backend's image-generate.ts now does). So a
    # server left on the stock --cfg-scale 7.0 runs FLUX-dev at real CFG 7 no matter what the client
    # asks for, which is what burns/oversaturates the output.
    #   --cfg-scale 1.0     REAL classifier-free guidance, OFF. FLUX-dev is guidance-*distilled*;
    #                       upstream's flux.md says "--cfg-scale is recommended to be set to 1".
    #   --guidance 3.5      the DISTILLED guidance FLUX actually conditions on. Different knob.
    #   --sampling-method   euler, per flux.md (the stock default is euler_a, meant for SD-era models).
    #   --steps 24          FLUX-dev wants ~20-28. For schnell set SD_STEPS=4.
    #
    # Placement: `--backend te=cpu` is the current spelling of flux.md's (now deprecated) --clip-on-cpu.
    # It keeps T5-XXL + CLIP-L off the GPU so the whole VRAM budget goes to the diffusion weights —
    # which is how upstream fits FLUX in 6 GB (or 4 GB) without any RAM offload. At Q4_K_S (~6.9 GB)
    # the diffusion model is fully resident on one card, so none of the streaming machinery is needed.
    # --diffusion-fa runs flash attention in the diffusion model (smaller attention buffer at 1 MP);
    # --vae-tiling decodes the VAE in tiles (~1.6 GB buffer -> ~0.4 GB), cheap insurance vs decode OOM.
    #
    # SD_EXTRA_ARGS is the escape hatch for weights that DON'T fit — e.g. running Q8_0 (~12.7 GB) on a
    # 12 GB card needs offload + a residency window, and the flags are tuned per box:
    #   SD_EXTRA_ARGS=--params-backend diffusion=cpu --max-vram cuda0=11 --stream-layers
    # (Never add --auto-fit: per its own -h it "Overrides --backend and --params-backend", so it
    # silently discards every placement flag above and re-OOMs.)
    command: >
      --diffusion-model /models/${SD_DIFFUSION_MODEL:-flux1-dev-Q4_K_S.gguf}
      --t5xxl           /models/${SD_T5XXL:-t5-v1_1-xxl-encoder-Q4_K_M.gguf}
      --clip_l          /models/${SD_CLIP_L:-clip_l.safetensors}
      --vae             /models/${SD_VAE:-ae.safetensors}
      --backend ${SD_BACKEND:-te=cpu}
      --cfg-scale ${SD_CFG_SCALE:-1.0}
      --guidance ${SD_GUIDANCE:-3.5}
      --sampling-method ${SD_SAMPLING_METHOD:-euler}
      --steps ${SD_STEPS:-24}
      --diffusion-fa
      --vae-tiling
      ${SD_EXTRA_ARGS:-}
      --listen-ip 0.0.0.0
      --listen-port ${SD_PORT:-1234}
      -v
    volumes:
      - ./models:/models
      - ./output:/output
    ports:
      # host_port:container_port. Set SD_HOST_PORT (+ SD_BIND=127.0.0.1) to publish on a private port
      # when fronting with gpu-broker; defaults to SD_PORT so a standalone run is unchanged.
      - "${SD_BIND:-0.0.0.0}:${SD_HOST_PORT:-1234}:${SD_PORT:-1234}"
    logging: *default-logging
    # --- NVIDIA GPU ---------------------------------------------------------
    # The default image (master-cuda) needs the NVIDIA Container Toolkit on the host.
    # For a non-NVIDIA host, set SD_IMAGE to master-vulkan/sycl/musa and delete this block.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
