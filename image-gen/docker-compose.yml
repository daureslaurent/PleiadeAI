# image-gen — self-hosted GGUF image generation server (stable-diffusion.cpp `sd-server`).
#
# Exposes an OpenAI-compatible endpoint on http://<host>:${SD_PORT:-1234}/v1/images/generations,
# so PleiadesAI (and any OpenAI image client) can generate images the same way it streams chat from
# a remote llama.cpp box. Point a `generate_image` tool / image endpoint at this URL.
#
# Models are NOT baked into the image — they are mounted from ./models (populate it with run.sh).
# Model file names are driven by the .env in this folder (see .env.example); defaults target
# FLUX.1-dev GGUF. This compose is standalone (its own network) and is NOT part of the root
# PleiadesAI stack; run it from this directory with `docker compose up -d`.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  sd-server:
    # leejet publishes only accelerator tags (no plain CPU `master`): master-cuda,
    # master-vulkan, master-sycl, master-musa. Default to CUDA; override via SD_IMAGE.
    image: ${SD_IMAGE:-ghcr.io/leejet/stable-diffusion.cpp:master-cuda}
    container_name: image_gen_sd_server
    restart: unless-stopped
    entrypoint: /sd-server
    # Flags per `sd-server -h`. FLUX needs four files: diffusion model + two text encoders + VAE.
    # For a single-file model (e.g. SD 1.5 GGUF), replace all four with a single `-m /models/<file>`.
    # --auto-fit spreads the modules (text encoders / diffusion / VAE) across whatever GPUs are
    # present, sized from each device's free VRAM — so on a multi-GPU box no single card gets
    # starved (a single 12 GB card OOM'd at VAE decode with the whole ~10 GB model on one device).
    # On a single-GPU box it's a no-op (places everything on that GPU).
    # Why Q8 needs streaming on this hardware: at Q8 the diffusion weights (12.1 GB) + text encoders
    # (3.4 GB) + the TWO per-card compute buffers a layer split allocates (~3.2 GB each) total ~22 GB,
    # but an 8 GB 2070 + 12 GB 3060 pair only has ~19.7 GB free. No placement or per-device budget
    # fixes a capacity shortfall — plain --auto-fit OOMs the 8 GB card ("segment N needs 3187 MB, only
    # 2850 available") because it also reserves the encoders there. So we stream instead:
    # --offload-to-cpu parks the full weights in system RAM (needs ~16 GB free RAM) and loads layers
    # into VRAM on demand; --stream-layers adds residency+prefetch on top of --max-vram (it is a no-op
    # WITHOUT --max-vram); --max-vram then acts as each card's VRAM residency window, not a hard weight
    # cap. Trade-off: streaming is PCIe-bound (per-step layer transfers), so generation is slower — the
    # cost of keeping Q8 quality on 20 GB of VRAM. Drop to Q5_K_S (~8.3 GB) via SD_DIFFUSION_MODEL to
    # run fully resident (no streaming) if speed matters more than the last bit of quality.
    # --diffusion-fa runs flash attention in the diffusion model, shrinking the O(seq_len) attention
    # activation buffer (image_seq_len 9216 at 768px) — keeps the per-card compute buffer as small as
    # possible so more of the residency window is spent on weights.
    # --vae-tiling additionally decodes the VAE in tiles (~1.6 GB buffer -> ~0.4 GB); cheap insurance
    # so the final decode can't OOM regardless of placement.
    command: >
      --diffusion-model /models/${SD_DIFFUSION_MODEL:-flux1-dev-Q8_0.gguf}
      --t5xxl           /models/${SD_T5XXL:-t5-v1_1-xxl-encoder-Q4_K_M.gguf}
      --clip_l          /models/${SD_CLIP_L:-clip_l.safetensors}
      --vae             /models/${SD_VAE:-ae.safetensors}
      --auto-fit
      --max-vram ${SD_MAX_VRAM:-cuda0=11,cuda1=7}
      --offload-to-cpu
      --stream-layers
      --diffusion-fa
      --vae-tiling
      --listen-ip 0.0.0.0
      --listen-port ${SD_PORT:-1234}
      -v
    volumes:
      - ./models:/models
      - ./output:/output
    ports:
      # host_port:container_port. Set SD_HOST_PORT (+ SD_BIND=127.0.0.1) to publish on a private port
      # when fronting with gpu-broker; defaults to SD_PORT so a standalone run is unchanged.
      - "${SD_BIND:-0.0.0.0}:${SD_HOST_PORT:-1234}:${SD_PORT:-1234}"
    logging: *default-logging
    # --- NVIDIA GPU ---------------------------------------------------------
    # The default image (master-cuda) needs the NVIDIA Container Toolkit on the host.
    # For a non-NVIDIA host, set SD_IMAGE to master-vulkan/sycl/musa and delete this block.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
